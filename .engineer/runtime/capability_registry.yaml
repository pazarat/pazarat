capability_registry:
  version: "9.1.0"
  principle: "Capabilities extend the factory through stable slots. No island tools."

  slots:
    identity_boundary:
      accepts: [policy, boundary_contract, identity_rule]
      doctor: factory-health
    intent_governance:
      accepts: [route, operation_mode, risk_classifier]
      doctor: factory-health
    truth_access_matrix:
      accepts: [truth_pulse, search_lens, index_adapter, matrix_engine, freshness_validator]
      doctor: file-matrix-doctor
    workshop_intelligence:
      accepts: [standard, playbook, maturity_lens, discipline_canon]
      doctor: factory-health
    truth_grounded_goal_closure:
      accepts: [goal_contract_rule, missing_ring_rule, readiness_gate]
      doctor: goal-closure
    strategy_solution_simulation:
      accepts: [strategy_playbook, alternative_comparator, anti_patching_rule]
      doctor: completion-audit
    tool_orchestration:
      accepts: [tool, adapter, dispatcher]
      doctor: runtime-audit
    execution_governance:
      accepts: [write_gate, impact_gate, rollback_rule]
      doctor: doctor
    validation_doctor:
      accepts: [validator, test_runner, health_check]
      doctor: factory-health
    ledger_memory_maintenance:
      accepts: [ledger, cache_policy, maintenance_rule]
      doctor: runtime-audit
    extension_layer:
      accepts: [engine, lens, protocol, adapter, validator]
      doctor: factory-health

  registration_contract:
    required_fields:
      - capability_id
      - slot
      - purpose
      - input_contract
      - output_contract
      - truth_relation
      - lifecycle_hooks
      - risk_level
      - doctor
      - receipt
