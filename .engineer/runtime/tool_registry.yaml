tools:

  workshop-lens:
    command: "python .engineer/commands/engineer.py workshop-lens"
    purpose: "Silent universal workshop method lens: 360 method, discipline canons, local standards generation, and project-truth boundary."
    mutates_filesystem: false
    default_safe_mode: read_only
    allowed_scope: "workshop"
    risk_level: "low"
    output_is_operating_context_not_report: true
  project-lens:
    command: "python .engineer/commands/engineer.py project-lens"
    purpose: "Fast project-surface lens that compresses project identity, truth sources, current state, strongest actionable domain, visible gaps, and first step without dumping raw evidence."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "project"
    risk_level: "low"
    generated_output: ".engineer/indexes/project_project_lens.json"
    output_is_operating_context_not_report: true

  value-atlas:
    command: "python .engineer/commands/engineer.py value-atlas"
    purpose: "Build a one-touch content value atlas across all file types: PRD, code, standards, decisions, documents, and generated-safe signals. Required before high-impact claims."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "project|runtime|repository|workshop"
    risk_level: "medium"
    generated_output: ".engineer/indexes/{scope}_content_value_atlas.json"
    output_is_operating_context_not_report: true
    required_for: [high-impact claims, assessment, first-step proposals, implementation translation, architecture decisions, repository repair]
  plug:
    command: "python .engineer/commands/engineer.py plug [--mode compact|full]"
    purpose: "One-touch central operating core; compact by default, full on request; returns route, tool plan, concept matrix, relationship graph, evidence gates, mandatory rules, and receipt."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "adaptive"
    risk_level: "medium"
    generated_output: ".engineer/indexes/last_central_plug.json"
    must_run_first_for: [project assessment, high-impact claims, writes, implementation translation, runtime assessment]
    output_is_operating_context_not_report: true
  neural:
    command: "python .engineer/commands/engineer.py neural"
    purpose: "Return the neural reflex graph for a request: active signals, linked safeguards, required gates, and blocked operations."
    mutates_filesystem: false
    default_safe_mode: read_only
    allowed_scope: "adaptive"
    risk_level: "medium"
    output_is_operating_context_not_report: true
  best-fit:
    command: "python .engineer/commands/engineer.py best-fit"
    purpose: "Compare current evidence to internal excellence patterns and produce a project/runtime-specific gap and recommendation matrix without using external web as truth."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "project|runtime|repository|workshop"
    risk_level: "medium"
    generated_output_requires_cache_meta: true

  truth-maturity:
    command: "python .engineer/commands/engineer.py truth-maturity"
    purpose: "Classify binding-but-insufficient sources as accepted, incomplete, missing, or conflicting truth before execution."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "project|runtime|repository|workshop"
    risk_level: "high"
    generated_output: ".engineer/indexes/<scope>_truth_maturity_scan.json"
    required_for: [implementation_translation, best_fit_review, production_oriented_execution, thin_reference_detection]
    blocks: [production_execution_over_incomplete_truth, invented_repair_as_accepted_truth]
  canon-check:
    command: "python .engineer/commands/engineer.py canon-check"
    purpose: "Verify that code generation is governed by code-practice/implementation canon, not stack names alone."
    mutates_filesystem: true
    default_safe_mode: dry_run_or_generated_output
    allowed_scope: "project|runtime|repository|workshop"
    risk_level: "high"
    generated_output: ".engineer/indexes/<scope>_canon_check.json"
    required_for: [code_generation, api_database_contracts, implementation_translation]
    blocks: [code_from_stack_name_only, migration_without_standard, realtime_without_consistency_strategy]
