routing_version: 1
actual_project_folder: 02_MY_PROJECT/pazarat

routes:
  - prd_root: docs/A_dashboards
    primary_surface: admin_and_operational_dashboards
    backend_modules_root: backend/src
    frontend_apps:
      - frontend/apps/admin
    database_root: database
    traceability_root: 00_PROJECT_TUNNEL/traceability

  - prd_root: docs/B_web_frontend
    primary_surface: public_and_user_web_frontend
    backend_modules_root: backend/src
    frontend_apps:
      - frontend/apps/web
    database_root: database
    traceability_root: 00_PROJECT_TUNNEL/traceability

  - prd_root: docs/C_mobile_app
    primary_surface: mobile_application
    backend_modules_root: backend/src
    frontend_apps:
      - frontend/apps/mobile
    database_root: database
    traceability_root: 00_PROJECT_TUNNEL/traceability

feature_rule:
  every_implementation_feature_must_have:
    - work_item_under: 00_PROJECT_TUNNEL/work_items
    - scenario_or_requirement_under: docs
    - traceability_record_under: 00_PROJECT_TUNNEL/traceability
    - code_or_data_artifact_under_one_of:
        - backend
        - frontend
        - database
        - infra
