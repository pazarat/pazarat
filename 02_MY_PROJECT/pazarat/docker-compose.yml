version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pazarat-postgres
    environment:
      POSTGRES_DB: pazarat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pazarat-network

  redis:
    image: redis:7
    container_name: pazarat-redis
    ports:
      - "6379:6379"
    networks:
      - pazarat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pazarat-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=pazarat;Username=postgres;Password=postgres
      - Redis__ConnectionString=redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - pazarat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pazarat-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pazarat-network

volumes:
  postgres_data:

networks:
  pazarat-network:
    driver: bridge
