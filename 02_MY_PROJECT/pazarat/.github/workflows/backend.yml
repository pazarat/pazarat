name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore backend/Pazarat.sln
    
    - name: Build
      run: dotnet build backend/Pazarat.sln --configuration Release --no-restore
    
    - name: Test
      run: dotnet test backend/Pazarat.sln --configuration Release --no-build --verbosity normal

  architecture-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore backend/Pazarat.sln
    
    - name: Build
      run: dotnet build backend/Pazarat.sln --configuration Release --no-restore
    
    - name: Run architecture tests
      run: dotnet test backend/tests/Pazarat.ArchitectureTests/Pazarat.ArchitectureTests.csproj --configuration Release --no-build
